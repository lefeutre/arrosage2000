<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arrosage 2000 Pro</title>
    <style>
        /* --- MOTEUR DE THÈMES HYPER-PERSONNALISÉ --- */
        :root {
            /* Cyber Night (Défaut) */
            --bg: #080c16; --surf: #151e32; --surf-alt: rgba(255, 255, 255, 0.05);
            --text: #f8fafc; --text-dim: #94a3b8; --prim: #0ea5e9; --prim-l: #38bdf8;
            --font: 'system-ui', sans-serif; --rad: 20px;
            --tank-border: 4px solid var(--text-dim); --tank-rad: 12px 12px 24px 24px;
            --water-bg: linear-gradient(180deg, var(--prim-l), var(--prim)); --foam: none;
        }

        body.theme-nature {
            --bg: #f0fdf4; --surf: #ffffff; --surf-alt: #f0fdf4;
            --text: #166534; --text-dim: #15803d; --prim: #22c55e; --prim-l: #4ade80;
            --font: 'Trebuchet MS', sans-serif; --rad: 30px;
            --tank-border: 4px solid #bbf7d0; --tank-rad: 30px;
        }

        body.theme-noah {
            /* Ambiance Taverne / Bière */
            --bg: #1e140a; --surf: #2d1d11; --surf-alt: #3d2817;
            --text: #fef3c7; --text-dim: #d97706; --prim: #f59e0b; --prim-l: #fbbf24;
            --font: 'Georgia', serif; --rad: 10px;
            /* Design Chope de bière */
            --tank-border: 6px solid rgba(255, 255, 255, 0.4); 
            --tank-rad: 5px 5px 20px 20px;
            --water-bg: linear-gradient(to bottom, #fbbf24, #b45309);
            --foam: 10px solid #ffffff; /* Mousse ! */
        }

        body.theme-tom {
            /* Ambiance Trail / Strava */
            --bg: #111827; --surf: #1f2937; --surf-alt: #374151;
            --text: #f8fafc; --text-dim: #9ca3af; --prim: #fc4c02; /* Orange sport */ --prim-l: #fdba74;
            --font: 'Impact', 'Arial Black', sans-serif; --rad: 8px;
            /* Design Flasque Souple */
            --tank-border: 3px solid #4b5563; 
            --tank-rad: 25px 25px 15px 15px;
            --water-bg: linear-gradient(to bottom, #06b6d4, #0369a1); /* Eau isotonique */
        }

        /* --- STYLES GLOBAUX --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 110px; display: flex; justify-content: center; transition: all 0.3s ease; }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-title { font-size: 1.4rem; font-weight: 800; color: var(--prim-l); }
        
        .view { display: none; padding: 15px; animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surf); border-radius: var(--rad); padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: var(--text-dim); font-family: sans-serif; }

        #active-banner { display: none; background: var(--prim); color: var(--bg); padding: 12px; border-radius: var(--rad); margin-bottom: 15px; text-align: center; font-weight: 900; animation: blink 1.5s infinite; font-family: sans-serif; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        /* Cuve Dynamique */
        .tank-mini { width: 90px; height: 150px; border: var(--tank-border); border-radius: var(--tank-rad); margin: 15px auto; position: relative; overflow: hidden; background: rgba(0,0,0,0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: all 0.3s; }
        .water-mini { position: absolute; bottom: 0; width: 100%; background: var(--water-bg); border-top: var(--foam); transition: height 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .tank-val { font-size: 2.5rem; font-weight: 900; text-align: center; margin-top: 10px; }

        /* UI Elements */
        .input-box { width: 100%; padding: 14px; border-radius: 12px; background: var(--surf-alt); border: 1px solid rgba(255,255,255,0.1); color: var(--text); margin-bottom: 12px; font-size: 1rem; outline: none; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .day-check { display: none; }
        .day-label { height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 10px; background: var(--surf-alt); color: var(--text-dim); font-weight: bold; font-size: 0.85rem; border: 1px solid transparent; cursor: pointer; transition: 0.2s; font-family: sans-serif;}
        .day-check:checked + .day-label { background: var(--prim); color: var(--bg); border-color: var(--prim-l); }

        .switch { position: relative; width: 54px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #475569; border-radius: 30px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--prim); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn { width: 100%; padding: 16px; background: var(--prim); color: var(--bg); border: none; border-radius: var(--rad); font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-boost { flex: 1; background: var(--surf-alt); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-boost:active { background: var(--prim); color: var(--bg); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--surf); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); backdrop-filter: blur(15px); }
        .nav-item { border: none; background: none; color: var(--text-dim); font-size: 0.7rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-family: sans-serif; }
        .nav-item.active { color: var(--prim); }
        
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translate(-50%, 20px); background: var(--text); color: var(--bg); padding: 12px 24px; border-radius: 30px; font-weight: bold; opacity: 0; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; z-index: 9999; font-family: sans-serif; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #toast.show { opacity: 1; transform: translate(-50%, 0); }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: var(--surf-alt); border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05); font-family: sans-serif; }
        .log-time { color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body class="theme-cyber">

    <div class="app-container">
        <header>
            <div class="header-title" id="main-title">Arrosage 2000</div>
            <div id="badge" style="font-size: 0.85rem; font-weight: bold; font-family: sans-serif;">● Connexion...</div>
        </header>

        <div id="active-banner">ACTION EN COURS</div>

        <main id="view-home" class="view active">
            <div class="card">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <span id="w-icon" style="font-size: 2.8rem;">🌤️</span>
                    <div style="font-family: sans-serif;">
                        <b id="w-city" style="font-size: 1.2rem;">--</b><br>
                        <span id="w-desc" style="color: var(--text-dim);">Recherche météo...</span>
                    </div>
                </div>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid rgba(255,255,255,0.08);">
                <div style="display: flex; justify-content: space-between; align-items: center; font-family: sans-serif;">
                    <small id="rain-label">Bloquer si pluie</small>
                    <label class="switch"><input type="checkbox" id="rain-toggle" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="card">
                <h3 id="tank-label" style="text-align: center;">Réserve de Liquide</h3>
                <div class="tank-mini"><div id="water-level" class="water-mini"></div></div>
                <div class="tank-val" id="vol-txt">-- L</div>
                <div style="text-align: center; color: var(--text-dim); font-size: 0.8rem; font-family: sans-serif;">Max : <span id="max-txt">50</span>L</div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-family: sans-serif;">
                    <b id="pump-label">Contrôle Manuel</b>
                    <label class="switch"><input type="checkbox" id="pump-toggle"><span class="slider"></span></label>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-boost" onclick="SmartEngine.boost(5)">⏱️ 5 min</button>
                    <button class="btn-boost" onclick="SmartEngine.boost(15)">⏱️ 15 min</button>
                    <button class="btn-boost" id="stop-btn" onclick="SmartEngine.stop()" style="color: #ef4444; display: none;">🛑 STOP</button>
                </div>
            </div>
        </main>

        <main id="view-plan" class="view">
            <div class="card">
                <h3>Ajouter un programme</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="time" id="time-in" class="input-box">
                    <input type="number" id="dur-in" class="input-box" placeholder="Min" min="1">
                </div>
                <div class="days-grid">
                    <label><input type="checkbox" class="day-check" value="Lu"><div class="day-label">Lu</div></label>
                    <label><input type="checkbox" class="day-check" value="Ma"><div class="day-label">Ma</div></label>
                    <label><input type="checkbox" class="day-check" value="Me"><div class="day-label">Me</div></label>
                    <label><input type="checkbox" class="day-check" value="Je"><div class="day-label">Je</div></label>
                    <label><input type="checkbox" class="day-check" value="Ve"><div class="day-label">Ve</div></label>
                    <label><input type="checkbox" class="day-check" value="Sa"><div class="day-label">Sa</div></label>
                    <label><input type="checkbox" class="day-check" value="Di"><div class="day-label">Di</div></label>
                </div>
                <button class="btn" onclick="saveNewPlan()">Enregistrer</button>
            </div>
            <div id="plan-list"></div>
        </main>

        <main id="view-stats" class="view">
            <div class="card">
                <h3>Historique d'activité</h3>
                <div id="logs-container" style="max-height: 60vh; overflow-y: auto;">
                    <div style="text-align:center; padding: 20px; color: var(--text-dim); font-style: italic;">Aucun événement récent.</div>
                </div>
                <button onclick="clearLogs()" style="width: 100%; padding: 10px; margin-top: 15px; background: none; border: 1px solid var(--text-dim); color: var(--text-dim); border-radius: 8px; cursor: pointer;">Effacer l'historique</button>
            </div>
        </main>

        <main id="view-settings" class="view">
            <div class="card">
                <h3>Styles & Ambiances</h3>
                <select id="theme-select" class="input-box">
                    <option value="theme-cyber">🔵 Cyber Night (Standard)</option>
                    <option value="theme-nature">🌿 Nature Soft (Zen)</option>
                    <option value="theme-noah">🍺 Thème Noah (Taverne)</option>
                    <option value="theme-tom">🏃 Thème Tom (Trail Pro)</option>
                </select>
            </div>
            <div class="card">
                <h3>Paramètres</h3>
                <input type="text" id="city-in" class="input-box" placeholder="Ville pour Météo">
                <input type="number" id="max-in" class="input-box" placeholder="Capacité Cuve (L)">
            </div>
            <button class="btn" onclick="saveSettings()">Appliquer les changements</button>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showView('view-home', this)"><span style="font-size: 1.4rem;">🏠</span>Accueil</button>
            <button class="nav-item" onclick="showView('view-plan', this)"><span style="font-size: 1.4rem;">📅</span>Planning</button>
            <button class="nav-item" onclick="showView('view-stats', this)"><span style="font-size: 1.4rem;">📋</span>Journal</button>
            <button class="nav-item" onclick="showView('view-settings', this)"><span style="font-size: 1.4rem;">⚙️</span>Réglages</button>
        </nav>
        
        <div id="toast">Message</div>
    </div>

    <script>
        // --- ETAT GLOBAL OPTIMISÉ ---
        const AppState = {
            volume: 0, 
            maxVolume: parseInt(localStorage.getItem('max_v')) || 50,
            isRaining: false, 
            schedules: [], 
            city: localStorage.getItem('city') || 'Molsheim',
            logs: JSON.parse(localStorage.getItem('sys_logs')) || [],
            lastTrigger: ""
        };

        // --- GESTION DU JOURNAL ---
        function addLog(message) {
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            const dateStr = String(now.getDate()).padStart(2, '0') + "/" + String(now.getMonth() + 1).padStart(2, '0');
            
            AppState.logs.unshift({ msg: message, time: `${dateStr} - ${timeStr}` });
            if (AppState.logs.length > 40) AppState.logs.pop(); // Garde les 40 derniers
            
            localStorage.setItem('sys_logs', JSON.stringify(AppState.logs));
            renderLogs();
        }

        function renderLogs() {
            const cont = document.getElementById('logs-container');
            if (AppState.logs.length === 0) {
                cont.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-dim);">Aucun événement récent.</div>';
                return;
            }
            cont.innerHTML = "";
            AppState.logs.forEach(log => {
                cont.innerHTML += `<div class="list-item"><span>${log.msg}</span><span class="log-time">${log.time}</span></div>`;
            });
        }

        function clearLogs() { AppState.logs = []; localStorage.removeItem('sys_logs'); renderLogs(); showToast("Journal effacé"); }

        // --- MOTEUR INTELLIGENT ---
        const SmartEngine = {
            timer: null,
            async boost(mins) {
                if (AppState.isRaining && document.getElementById('rain-toggle').checked) {
                    addLog("☔ Action annulée (Pluie)");
                    return showToast("Pluie : Action bloquée ☔");
                }
                if (AppState.volume <= 0.2) {
                    addLog("❌ Action annulée (Cuve vide)");
                    return showToast("Impossible : Réservoir vide !");
                }
                
                await sendPump(true);
                document.getElementById('active-banner').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'block';
                showToast(`Minuteur : ${mins} minutes`);
                addLog(`▶️ Démarrage (${mins} min)`);
                
                this.timer = setTimeout(() => this.stop(true), mins * 60000);
            },
            async stop(done = false) {
                clearTimeout(this.timer);
                await sendPump(false);
                document.getElementById('active-banner').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'none';
                showToast(done ? "Terminé ! ✅" : "Arrêté ! 🛑");
                addLog(done ? "✅ Fin du minuteur" : "🛑 Arrêt manuel");
            }
        };

        // --- CONNEXION SERVEUR ---
        async function fetchAll() {
            try {
                const res = await fetch('/.netlify/functions/get-status');
                const data = await res.json();
                
                // Volume
                AppState.volume = parseFloat(data.volume_eau);
                const pct = (AppState.volume / AppState.maxVolume) * 100;
                document.getElementById('water-level').style.height = Math.min(pct, 100) + "%";
                
                const txt = document.getElementById('vol-txt');
                if (AppState.volume <= 0.2) {
                    txt.innerHTML = "<span style='color:#ef4444'>VIDE !</span>";
                    if (data.pompe_etat) {
                        await sendPump(false); // Sécurité matérielle absolue
                        addLog("⚠️ Coupure sécurité (Cuve 0L)");
                    }
                } else {
                    txt.textContent = AppState.volume.toFixed(1) + " L";
                }

                // Pompe
                document.getElementById('pump-toggle').checked = data.pompe_etat;
                updateThemeLabels(document.body.className, data.pompe_etat);

                // Planning
                if (JSON.stringify(data.planning) !== JSON.stringify(AppState.schedules)) {
                    AppState.schedules = data.planning || [];
                    renderPlans();
                }

                document.getElementById('badge').style.color = "#10b981";
                document.getElementById('badge').textContent = "● Connecté";
            } catch(e) { document.getElementById('badge').style.color = "#ef4444"; document.getElementById('badge').textContent = "● Erreur Serveur"; }
        }

        async function sendPump(state) {
            await fetch('/.netlify/functions/update-pump', { method: 'POST', body: JSON.stringify({ pompe_etat: state }) });
        }

        // Toggle Manuel
        document.getElementById('pump-toggle').onchange = (e) => {
            if (e.target.checked) {
                if (AppState.volume <= 0.2) {
                    e.target.checked = false;
                    return showToast("Réservoir vide !");
                }
                addLog("▶️ Allumage manuel");
            } else {
                addLog("🛑 Extinction manuelle");
            }
            sendPump(e.target.checked);
        };

        // --- MÉTÉO ---
        async function fetchWeather() {
            try {
                const g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${AppState.city}&count=1`)).json();
                if(!g.results) return;
                const { latitude, longitude, name } = g.results[0];
                const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`)).json();
                
                AppState.isRaining = w.current_weather.weathercode >= 51;
                document.getElementById('w-city').textContent = name;
                document.getElementById('w-desc').textContent = `${w.current_weather.temperature}°C - ${AppState.isRaining ? 'Pluie ☔' : 'Sec ☀️'}`;
                document.getElementById('w-icon').textContent = AppState.isRaining ? '🌧️' : '☀️';
            } catch(e) {}
        }

        // --- PLANNING UI ---
        async function saveNewPlan() {
            const time = document.getElementById('time-in').value;
            const duration = document.getElementById('dur-in').value;
            const days = Array.from(document.querySelectorAll('.day-check:checked')).map(c => c.value);
            
            if(!time || !duration || days.length === 0) return showToast("Heure, durée ou jours manquants !");
            
            AppState.schedules.push({ time, duration, days });
            await fetch('/.netlify/functions/update-planning', { method: 'POST', body: JSON.stringify({ planning: AppState.schedules }) });
            renderPlans();
            addLog(`📅 Prog ajouté: ${time} (${days.length}j)`);
            showToast("Programme sauvegardé !");
        }

        function renderPlans() {
            const cont = document.getElementById('plan-list'); cont.innerHTML = "";
            AppState.schedules.forEach((p, i) => {
                cont.innerHTML += `<div class="list-item"><div><b>${p.time}</b> (${p.duration}m)<br><small style="color:var(--text-dim)">${p.days.join(' ')}</small></div><button onclick="delPlan(${i})" style="border:none; background:none; color:#ef4444; font-weight:bold; padding:10px; font-size:1.2rem; cursor:pointer;">✖</button></div>`;
            });
        }

        async function delPlan(i) {
            AppState.schedules.splice(i, 1);
            await fetch('/.netlify/functions/update-planning', { method: 'POST', body: JSON.stringify({ planning: AppState.schedules }) });
            renderPlans();
            addLog("🗑️ Programme supprimé");
        }

        // --- THEMES & LABELS ---
        function updateThemeLabels(theme, isRunning) {
            const title = document.getElementById('main-title');
            const tank = document.getElementById('tank-label');
            const pump = document.getElementById('pump-label');
            const banner = document.getElementById('active-banner');

            if(theme === 'theme-noah') {
                title.textContent = "Noah Tavern 🍺"; tank.textContent = "Fût de Pression";
                pump.textContent = isRunning ? "TIREUSE EN SERVICE" : "Tireuse fermée";
                banner.textContent = "🍺 SERVICE EN COURS 🍺";
            } else if(theme === 'theme-tom') {
                title.textContent = "Tom Trail Pro 🏃"; tank.textContent = "Flasque d'Hydratation";
                pump.textContent = isRunning ? "HYDRATATION ACTIVE" : "Pause Session";
                banner.textContent = "🏃 RUN EN COURS 🏃";
            } else {
                title.textContent = "Arrosage 2000"; tank.textContent = "Réserve d'Eau";
                pump.textContent = isRunning ? "POMPE EN MARCHE" : "Contrôle Manuel";
                banner.textContent = "💧 ARROSAGE EN COURS 💧";
            }
        }

        function saveSettings() {
            const c = document.getElementById('city-in').value;
            const m = document.getElementById('max-in').value;
            const t = document.getElementById('theme-select').value;
            
            if(c) { AppState.city = c; localStorage.setItem('city', c); }
            if(m) { AppState.maxVolume = m; localStorage.setItem('max_v', m); document.getElementById('max-txt').textContent = m; }
            
            document.body.className = t;
            localStorage.setItem('arrosage_theme', t);
            
            updateThemeLabels(t, document.getElementById('pump-toggle').checked);
            fetchWeather();
            showToast("Préférences enregistrées !");
        }

        // --- NAVIGATION & UTILITAIRES ---
        function showView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function showToast(m) { 
            const t = document.getElementById('toast'); t.textContent = m; 
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); 
        }

        window.onload = () => {
            // Initialisation
            const savedTheme = localStorage.getItem('arrosage_theme') || 'theme-cyber';
            document.body.className = savedTheme;
            document.getElementById('theme-select').value = savedTheme;
            document.getElementById('max-in').value = AppState.maxVolume;
            document.getElementById('max-txt').textContent = AppState.maxVolume;
            document.getElementById('city-in').value = AppState.city;

            renderLogs();
            fetchWeather(); 
            fetchAll();
            
            // Boucles
            setInterval(fetchAll, 4000); // 4s pour les données critiques
            setInterval(fetchWeather, 600000); // 10 minutes pour la météo
            
            setInterval(() => {
                const now = new Date();
                const cur = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                const curDay = ['Di','Lu','Ma','Me','Je','Ve','Sa'][now.getDay()];

                AppState.schedules.forEach(p => {
                    if(p.time === cur && p.days.includes(curDay) && AppState.lastTrigger !== cur) {
                        AppState.lastTrigger = cur;
                        addLog("⏰ Déclenchement Auto");
                        SmartEngine.boost(parseInt(p.duration));
                    }
                });
            }, 30000);
        };
    </script>
</body>
