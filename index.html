<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arrosage 2000 Smart</title>
    <style>
        :root {
            --bg-color: #080c16; --surface: #151e32; --surface-alt: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc; --text-sec: #94a3b8; --primary: #0ea5e9; --primary-light: #38bdf8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.08); --nav-bg: rgba(8, 12, 22, 0.85); --radius: 20px;
        }

        /* --- Correction Thème Clair --- */
        body.light-theme {
            --bg-color: #f1f5f9; --surface: #ffffff; --surface-alt: rgba(0, 0, 0, 0.04);
            --text-main: #0f172a; --text-sec: #64748b; --border: rgba(0, 0, 0, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 100px; display: flex; justify-content: center; transition: all 0.3s; }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.3rem; font-weight: 800; color: var(--primary-light); }
        .view { display: none; padding: 0 15px; animation: fade 0.3s; }
        .view.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Tank */
        .tank-mini { width: 90px; height: 140px; border: 4px solid var(--border); border-radius: 10px 10px 20px 20px; margin: 10px auto; position: relative; overflow: hidden; background: rgba(0,0,0,0.1); }
        .water-mini { position: absolute; bottom: 0; width: 100%; background: var(--primary); transition: height 1s, background 0.3s; }
        
        /* UI Elements */
        .switch { position: relative; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; border-radius: 30px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; padding: 12px; background: var(--surface-alt); border-radius: 12px; margin-top: 8px; border: 1px solid var(--border); }
        
        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--nav-bg); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { background: none; border: none; color: var(--text-sec); font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 20px; border-radius: 30px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-title">Arrosage 2000 🇫🇷</div>
            <div id="connexion-badge" style="font-size: 0.8rem; font-weight: bold;">● Init...</div>
        </header>

        <main id="view-home" class="view active">
            <div class="card" style="padding: 12px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="w-icon" style="font-size: 1.5rem;">🌤️</span>
                    <div>
                        <b id="w-city">Météo...</b><br>
                        <small id="w-desc" style="color:var(--text-sec)">Chargement...</small>
                    </div>
                </div>
                <hr style="margin: 10px 0; border: none; border-top: 1px solid var(--border);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <small>Désactiver si pluie annoncée</small>
                    <label class="switch"><input type="checkbox" id="smart-weather-toggle" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <h3>Réserve d'Eau</h3>
                <div class="tank-mini"><div id="water-level" class="water-mini"></div></div>
                <h2 id="vol-txt">-- L</h2>
                <small style="color:var(--text-sec)">Dernière synchro : <span id="sync-time">--</span></small>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b id="pump-label">Pompe</b>
                    <label class="switch"><input type="checkbox" id="pump-toggle"><span class="slider"></span></label>
                </div>
            </div>
        </main>

        <main id="view-plan" class="view">
            <div class="card">
                <h3>Nouveau Programme</h3>
                <input type="time" id="time-in" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; background:var(--surface-alt); border:1px solid var(--border); color:white;">
                <input type="number" id="dur-in" placeholder="Minutes" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; background:var(--surface-alt); border:1px solid var(--border); color:white;">
                <button class="btn" onclick="addSchedule()">Enregistrer</button>
            </div>
            <div id="plan-list"></div>
        </main>

        <main id="view-settings" class="view">
            <div class="card">
                <h3>Préférences</h3>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <b>Thème Clair</b>
                    <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showView('view-home', this)">🏠 Accueil</button>
            <button class="nav-item" onclick="showView('view-plan', this)">📅 Planning</button>
            <button class="nav-item" onclick="showView('view-settings', this)">⚙️ Réglages</button>
        </nav>
        <div id="toast">Message</div>
    </div>

    <script>
        const AppState = {
            waterCurrent: 0, waterMax: 50,
            isRaining: false, schedules: []
        };

        // --- THEME ---
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('change', (e) => {
            document.body.classList.toggle('light-theme', e.target.checked);
            localStorage.setItem('arrosage_theme', e.target.checked ? 'light' : 'dark');
        });

        function showToast(m) {
            const t = document.getElementById('toast'); t.textContent = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/.netlify/functions/get-status');
                const data = await res.json();
                
                // MÀJ Eau + SÉCURITÉ VIDE
                AppState.waterCurrent = parseFloat(data.volume_eau);
                updateWaterUI();

                if (AppState.waterCurrent <= 0 && data.pompe_etat) {
                    await sendPumpCommand(false);
                    showToast("⚠️ SÉCURITÉ : Cuve vide !");
                }

                // MÀJ Pompe
                document.getElementById('pump-toggle').checked = data.pompe_etat;
                document.getElementById('pump-label').textContent = data.pompe_etat ? "POMPE EN MARCHE" : "Pompe à l'arrêt";
                
                // MÀJ Badge
                const badge = document.getElementById('connexion-badge');
                badge.style.color = "#10b981"; badge.textContent = "● Connecté";
                document.getElementById('sync-time').textContent = new Date().toLocaleTimeString('fr-FR');

                // MÀJ Planning
                if (JSON.stringify(data.planning) !== JSON.stringify(AppState.schedules)) {
                    AppState.schedules = data.planning || [];
                    renderSchedules();
                }
            } catch(e) { document.getElementById('connexion-badge').style.color = "#ef4444"; }
        }

        function updateWaterUI() {
            const pct = (AppState.waterCurrent / AppState.waterMax) * 100;
            const bar = document.getElementById('water-level');
            const txt = document.getElementById('vol-txt');
            bar.style.height = pct + "%";
            txt.textContent = AppState.waterCurrent.toFixed(1) + " L";
            
            if (AppState.waterCurrent <= 0) { bar.style.background = "var(--danger)"; txt.style.color = "var(--danger)"; }
            else if (AppState.waterCurrent < 5) { bar.style.background = "var(--warning)"; txt.style.color = "var(--warning)"; }
            else { bar.style.background = "var(--primary)"; txt.style.color = "inherit"; }
        }

        async function sendPumpCommand(state) {
            // SÉCURITÉ PLUIE
            const rainLock = document.getElementById('smart-weather-toggle').checked;
            if (state && AppState.isRaining && rainLock) {
                showToast("Arrosage bloqué : Il pleut ! ☔");
                document.getElementById('pump-toggle').checked = false;
                return;
            }
            await fetch('/.netlify/functions/update-pump', { method: 'POST', body: JSON.stringify({ pompe_etat: state }) });
        }

        document.getElementById('pump-toggle').onchange = (e) => sendPumpCommand(e.target.checked);

        async function addSchedule() {
            const time = document.getElementById('time-in').value;
            const duration = document.getElementById('dur-in').value;
            if(!time || !duration) return showToast("Champs vides !");
            AppState.schedules.push({ time, duration, days: ["Lu","Ma","Me","Je","Ve","Sa","Di"] });
            await syncPlanning();
        }

        async function syncPlanning() {
            renderSchedules();
            await fetch('/.netlify/functions/update-planning', { method: 'POST', body: JSON.stringify({ planning: AppState.schedules }) });
            showToast("Planning enregistré !");
        }

        function renderSchedules() {
            const cont = document.getElementById('plan-list'); cont.innerHTML = "";
            AppState.schedules.forEach((p, i) => {
                cont.innerHTML += `<div class="list-item"><span><b>${p.time}</b> (${p.duration}m)</span><button onclick="delPlan(${i})" style="background:none; border:none; color:red; font-weight:bold;">✖</button></div>`;
            });
        }

        async function delPlan(i) { AppState.schedules.splice(i, 1); await syncPlanning(); }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.54&longitude=7.49&current_weather=true`);
                const data = await res.json();
                AppState.isRaining = data.current_weather.weathercode >= 51;
                document.getElementById('w-city').textContent = "Molsheim";
                document.getElementById('w-desc').textContent = `${data.current_weather.temperature}°C - ${AppState.isRaining ? 'Pluie ☔' : 'Sec ☀️'}`;
                document.getElementById('w-icon').textContent = AppState.isRaining ? '🌧️' : '☀️';
            } catch(e) {}
        }

        function showView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = () => {
            // Charger thème
            const savedTheme = localStorage.getItem('arrosage_theme');
            if(savedTheme === 'light') { document.body.classList.add('light-theme'); themeToggle.checked = true; }
            
            fetchWeather(); fetchStatus();
            setInterval(fetchStatus, 4000);
            setInterval(() => {
                const now = new Date();
                const currentH = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                AppState.schedules.forEach(p => {
                    if(p.time === currentH && AppState.lastTriggeredTime !== currentH) {
                        AppState.lastTriggeredTime = currentH;
                        sendPumpCommand(true);
                        showToast("⏰ Planning lancé !");
                    }
                });
            }, 30000);
        };
    </script>
</body>
</html>
