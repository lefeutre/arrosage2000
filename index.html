<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arrosage 2000 Smart</title>
    <style>
        :root {
            --bg-color: #080c16; --surface: #151e32; --surface-alt: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc; --text-sec: #94a3b8; --primary: #0ea5e9; --primary-light: #38bdf8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.08); --nav-bg: rgba(8, 12, 22, 0.85); --radius: 20px;
        }

        body.light-theme {
            --bg-color: #f1f5f9; --surface: #ffffff; --surface-alt: rgba(0, 0, 0, 0.04);
            --text-main: #0f172a; --text-sec: #64748b; --border: rgba(0, 0, 0, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 110px; display: flex; justify-content: center; transition: background 0.3s; }
        .app-container { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.4rem; font-weight: 800; color: var(--primary-light); display: flex; align-items: center; gap: 8px; }
        
        .view { display: none; padding: 0 15px; animation: fadeUp 0.3s ease-out; }
        .view.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* Bannière d'activité */
        #active-banner { display: none; background: rgba(14, 165, 233, 0.2); border: 1px solid var(--primary-light); color: var(--primary-light); padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* Cuve */
        .tank-mini { width: 100px; height: 160px; border: 4px solid var(--border); border-radius: 12px 12px 24px 24px; margin: 10px auto; position: relative; overflow: hidden; background: rgba(0,0,0,0.1); }
        .water-mini { position: absolute; bottom: 0; width: 100%; background: linear-gradient(180deg, var(--primary-light), var(--primary)); transition: height 1s, background 0.3s; }
        .tank-val { font-size: 2rem; font-weight: 800; margin-top: 10px; }

        /* Inputs & Buttons */
        .switch { position: relative; width: 52px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; border-radius: 30px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-boost { flex: 1; background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 10px; font-size: 0.85rem; }
        .btn-boost:active { background: var(--primary); color: white; }

        .input-box { width: 100%; padding: 12px; border-radius: 10px; background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-main); margin-bottom: 10px; outline: none; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin: 15px 0; }
        .day-check { display: none; }
        .day-label { padding: 10px 0; text-align: center; background: var(--surface-alt); border-radius: 8px; font-size: 0.8rem; font-weight: bold; color: var(--text-sec); border: 1px solid transparent; }
        .day-check:checked + .day-label { background: rgba(14, 165, 233, 0.2); color: var(--primary-light); border-color: var(--primary); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); }
        .nav-item { border: none; background: none; color: var(--text-sec); font-size: 0.75rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .nav-icon { font-size: 1.4rem; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg-color); padding: 10px 20px; border-radius: 30px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 9999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-title">Arrosage 2000 🇫🇷</div>
            <div id="badge" style="font-size: 0.85rem; font-weight: bold;">● Init...</div>
        </header>

        <div id="active-banner">🌊 ARROSAGE EN COURS...</div>

        <main id="view-home" class="view active">
            <div class="card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span id="w-icon" style="font-size: 2.5rem;">🌤️</span>
                    <div>
                        <strong id="w-city">Molsheim</strong><br>
                        <span id="w-desc" style="color: var(--text-sec);">Chargement...</span>
                    </div>
                </div>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <small>Désactiver si pluie annoncée</small>
                    <label class="switch"><input type="checkbox" id="rain-toggle" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <h3>Réserve d'Eau</h3>
                <div class="tank-mini"><div id="water-level" class="water-mini"></div></div>
                <div class="tank-val" id="vol-txt">-- L</div>
                <small style="color: var(--text-sec)">Capacité max : <span id="max-txt">50</span>L</small>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <b id="pump-label">Pompe</b>
                    <label class="switch"><input type="checkbox" id="pump-toggle"><span class="slider"></span></label>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-boost" onclick="SmartEngine.boost(5)">⏱️ 5 min</button>
                    <button class="btn-boost" onclick="SmartEngine.boost(15)">⏱️ 15 min</button>
                    <button class="btn-boost" id="stop-btn" onclick="SmartEngine.stop()" style="color: var(--danger); display: none;">🛑 STOP</button>
                </div>
            </div>
        </main>

        <main id="view-plan" class="view">
            <div class="card">
                <h3>Programmer un arrosage</h3>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <input type="time" id="time-in" class="input-box">
                    <input type="number" id="dur-in" class="input-box" placeholder="Min">
                </div>
                <div class="days-grid">
                    <label><input type="checkbox" class="day-check" value="Lu"><div class="day-label">Lu</div></label>
                    <label><input type="checkbox" class="day-check" value="Ma"><div class="day-label">Ma</div></label>
                    <label><input type="checkbox" class="day-check" value="Me"><div class="day-label">Me</div></label>
                    <label><input type="checkbox" class="day-check" value="Je"><div class="day-label">Je</div></label>
                    <label><input type="checkbox" class="day-check" value="Ve"><div class="day-label">Ve</div></label>
                    <label><input type="checkbox" class="day-check" value="Sa"><div class="day-label">Sa</div></label>
                    <label><input type="checkbox" class="day-check" value="Di"><div class="day-label">Di</div></label>
                </div>
                <button class="btn" onclick="saveNewPlan()">Ajouter au planning</button>
            </div>
            <div id="plan-list"></div>
        </main>

        <main id="view-settings" class="view">
            <div class="card">
                <h3>Météo</h3>
                <label><small>Ville (ex: Paris, Molsheim...)</small></label>
                <input type="text" id="city-in" class="input-box" placeholder="Nom de la ville">
            </div>
            <div class="card">
                <h3>Matériel</h3>
                <label><small>Volume cuve (Litres)</small></label>
                <input type="number" id="max-in" class="input-box">
            </div>
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <b>Thème Clair</b>
                    <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
                </div>
            </div>
            <button class="btn" onclick="saveSettings()">Sauvegarder les réglages</button>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showView('view-home', this)"><span class="nav-icon">🏠</span>Accueil</button>
            <button class="nav-item" onclick="showView('view-plan', this)"><span class="nav-icon">📅</span>Planning</button>
            <button class="nav-item" onclick="showView('view-settings', this)"><span class="nav-icon">⚙️</span>Réglages</button>
        </nav>
        <div id="toast">Message</div>
    </div>

    <script>
        const AppState = {
            volume: 0, maxVolume: parseInt(localStorage.getItem('max_v')) || 50,
            isRaining: false, schedules: [], city: localStorage.getItem('city') || 'Molsheim'
        };

        const SmartEngine = {
            timer: null,
            async boost(mins) {
                if (AppState.isRaining && document.getElementById('rain-toggle').checked) return showToast("Bloqué : Il pleut ! ☔");
                if (AppState.volume <= 0.1) return showToast("Erreur : Cuve vide !");
                
                showToast(`Boost lancé pour ${mins} min`);
                document.getElementById('active-banner').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'block';
                await sendPump(true);
                this.timer = setTimeout(() => this.stop(true), mins * 60000);
            },
            async stop(done = false) {
                clearTimeout(this.timer);
                await sendPump(false);
                document.getElementById('active-banner').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'none';
                showToast(done ? "Arrosage terminé ✅" : "Arrosage stoppé 🛑");
            }
        };

        async function fetchAll() {
            try {
                const res = await fetch('/.netlify/functions/get-status');
                const data = await res.json();
                
                // Volume & Sécurité
                AppState.volume = parseFloat(data.volume_eau);
                const pct = (AppState.volume / AppState.maxVolume) * 100;
                document.getElementById('water-level').style.height = pct + "%";
                
                const txt = document.getElementById('vol-txt');
                if (AppState.volume <= 0.1) {
                    txt.innerHTML = "<span style='color:var(--danger)'>VIDE !</span>";
                    document.getElementById('water-level').style.background = "var(--danger)";
                    if (data.pompe_etat) await sendPump(false); // Force l'arrêt
                } else {
                    txt.textContent = AppState.volume.toFixed(1) + " L";
                    document.getElementById('water-level').style.background = (AppState.volume < 5) ? "var(--warning)" : "linear-gradient(180deg, var(--primary-light), var(--primary))";
                }

                // Pompe Status
                document.getElementById('pump-toggle').checked = data.pompe_etat;
                document.getElementById('pump-label').textContent = data.pompe_etat ? "POMPE ACTIVE" : "Prêt à arroser";
                
                // Badge & Planning Sync
                document.getElementById('badge').style.color = "#10b981";
                document.getElementById('badge').textContent = "● Connecté";
                if (JSON.stringify(data.planning) !== JSON.stringify(AppState.schedules)) {
                    AppState.schedules = data.planning || [];
                    renderPlans();
                }
            } catch(e) { document.getElementById('badge').textContent = "● Hors ligne"; }
        }

        async function sendPump(s) {
            await fetch('/.netlify/functions/update-pump', { method: 'POST', body: JSON.stringify({ pompe_etat: s }) });
        }

        document.getElementById('pump-toggle').onchange = (e) => {
            if (e.target.checked && AppState.volume <= 0.1) { e.target.checked = false; return showToast("Impossible : Cuve vide !"); }
            sendPump(e.target.checked);
        };

        async function fetchWeather() {
            try {
                const geo = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${AppState.city}&count=1`)).json();
                if(!geo.results) return;
                const { latitude, longitude, name } = geo.results[0];
                const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`)).json();
                
                AppState.isRaining = w.current_weather.weathercode >= 51;
                document.getElementById('w-city').textContent = name;
                document.getElementById('w-desc').textContent = `${w.current_weather.temperature}°C - ${AppState.isRaining ? 'Pluie ☔' : 'Sec ☀️'}`;
                document.getElementById('w-icon').textContent = AppState.isRaining ? '🌧️' : '☀️';
            } catch(e) {}
        }

        async function saveNewPlan() {
            const time = document.getElementById('time-in').value;
            const duration = document.getElementById('dur-in').value;
            const days = Array.from(document.querySelectorAll('.day-check:checked')).map(c => c.value);
            if(!time || !duration || days.length === 0) return showToast("Complète tous les champs !");
            
            AppState.schedules.push({ time, duration, days });
            await fetch('/.netlify/functions/update-planning', { method: 'POST', body: JSON.stringify({ planning: AppState.schedules }) });
            renderPlans();
            showToast("Planning enregistré !");
        }

        function renderPlans() {
            const cont = document.getElementById('plan-list'); cont.innerHTML = "";
            AppState.schedules.forEach((p, i) => {
                cont.innerHTML += `<div class="list-item"><span><b>${p.time}</b> (${p.duration}m) - ${p.days.join(',')}</span><button onclick="delPlan(${i})" style="border:none; background:none; color:red; font-weight:bold;">✖</button></div>`;
            });
        }

        async function delPlan(i) {
            AppState.schedules.splice(i, 1);
            await fetch('/.netlify/functions/update-planning', { method: 'POST', body: JSON.stringify({ planning: AppState.schedules }) });
            renderPlans();
        }

        function saveSettings() {
            const newCity = document.getElementById('city-in').value;
            const newMax = document.getElementById('max-in').value;
            if(newCity) { AppState.city = newCity; localStorage.setItem('city', newCity); }
            if(newMax) { AppState.maxVolume = newMax; localStorage.setItem('max_v', newMax); document.getElementById('max-txt').textContent = newMax; }
            fetchWeather();
            showToast("Réglages sauvegardés !");
        }

        function showView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

        window.onload = () => {
            // Thème Init
            if(localStorage.getItem('arrosage_theme') === 'light') { document.body.classList.add('light-theme'); document.getElementById('theme-toggle').checked = true; }
            document.getElementById('theme-toggle').onchange = (e) => {
                document.body.classList.toggle('light-theme', e.target.checked);
                localStorage.setItem('arrosage_theme', e.target.checked ? 'light' : 'dark');
            };

            document.getElementById('max-in').value = AppState.maxVolume;
            document.getElementById('max-txt').textContent = AppState.maxVolume;
            document.getElementById('city-in').value = AppState.city;

            fetchWeather(); fetchAll();
            setInterval(fetchAll, 4000);
            
            // Horloge Planning (Vérification toutes les 30s)
            setInterval(() => {
                const now = new Date();
                const curTime = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
                const days = ['Di','Lu','Ma','Me','Je','Ve','Sa'];
                const curDay = days[now.getDay()];

                AppState.schedules.forEach(p => {
                    if(p.time === curTime && p.days.includes(curDay) && AppState.lastTime !== curTime) {
                        AppState.lastTime = curTime;
                        SmartEngine.boost(parseInt(p.duration));
                    }
                });
            }, 30000);
        };
    </script>
</body>
</html>
